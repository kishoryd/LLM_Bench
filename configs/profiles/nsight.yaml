name: "nsight"
type: "nsight"
description: "NVIDIA Nsight Systems + Nsight Compute profiling"

nsight_systems:
  enabled: true
  output_dir: "results/nsight/"
  trace: ["cuda", "nvtx", "osrt"]
  duration: 60                    # max capture seconds
  command: "nsys profile"
  extra_args: "--stats=true"

nsight_compute:
  enabled: false                  # expensive — enable selectively
  output_dir: "results/ncu/"
  metrics: ["sm__throughput.avg.pct_of_peak_sustained_elapsed"]
  kernel_filter: ""               # regex to filter kernels
  command: "ncu"
